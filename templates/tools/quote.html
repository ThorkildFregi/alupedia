  <blockquote class="blockquote">
    <p>« {{ content["text"] }} »</p>

    <a href="{{ content['wikipedia'] }}">{{ content["author"] }}</a> {% if content["source"] != "" %} dans <cite title="Source Title">{{ content["source"] }}</cite> {% endif %}
  </figcaption>
</figure>
